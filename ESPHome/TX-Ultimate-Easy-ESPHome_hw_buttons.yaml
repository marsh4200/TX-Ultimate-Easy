---
substitutions:
  invalid_cooldown: 100ms

  BUTTON_ACTION_NONE_TEXT: "None"
  BUTTON_1_ACTION_TEXT: "Relay 1 (toggle)"
  BUTTON_2_ACTION_TEXT: "Relay 2 (toggle)"
  BUTTON_3_ACTION_TEXT: "Relay 3 (toggle)"
  BUTTON_4_ACTION_TEXT: "Relay 4 (toggle)"
  BUTTON_1_ACTION_FAILSAFE_TEXT: "Relay 1 (API failsafe only)"
  BUTTON_2_ACTION_FAILSAFE_TEXT: "Relay 2 (API failsafe only)"
  BUTTON_3_ACTION_FAILSAFE_TEXT: "Relay 3 (API failsafe only)"
  BUTTON_4_ACTION_FAILSAFE_TEXT: "Relay 4 (API failsafe only)"

  BUTTON_DOUBLE_CLICK_ACTION_NONE_TEXT: "None"
  BUTTON_DOUBLE_CLICK_ACTION_RELAY_1_TOGGLE_TEXT: "Relay 1 (toggle)"
  BUTTON_DOUBLE_CLICK_ACTION_RELAY_2_TOGGLE_TEXT: "Relay 2 (toggle)"
  BUTTON_DOUBLE_CLICK_ACTION_RELAY_3_TOGGLE_TEXT: "Relay 3 (toggle)"
  BUTTON_DOUBLE_CLICK_ACTION_RELAY_4_TOGGLE_TEXT: "Relay 4 (toggle)"
  BUTTON_DOUBLE_CLICK_ACTION_HA_TOGGLE_TEXT: "Home Assistant target (toggle)"
  BUTTON_DOUBLE_CLICK_ACTION_HA_TURN_ON_TEXT: "Home Assistant target (turn on)"
  BUTTON_DOUBLE_CLICK_ACTION_HA_TURN_OFF_TEXT: "Home Assistant target (turn off)"
  BUTTON_DOUBLE_CLICK_ACTION_MEDIA_PLAY_PAUSE_TEXT: "Media player target (play/pause)"
  BUTTON_DOUBLE_CLICK_ACTION_MEDIA_NEXT_TEXT: "Media player target (next track)"
  BUTTON_DOUBLE_CLICK_ACTION_MEDIA_PREVIOUS_TEXT: "Media player target (previous track)"
  BUTTON_DOUBLE_CLICK_ACTION_MEDIA_STOP_TEXT: "Media player target (stop)"
  BUTTON_DOUBLE_CLICK_ACTION_SCRIPT_TEXT: "Script target (run)"
  BUTTON_DOUBLE_CLICK_ACTION_SCENE_TEXT: "Scene target (activate)"
  BUTTON_DOUBLE_CLICK_ACTION_BUTTON_TEXT: "Button target (press)"
  BUTTON_DOUBLE_CLICK_ACTION_AUTOMATION_TEXT: "Automation target (trigger)"

  BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT: "None"
  BUTTON_DOUBLE_CLICK_TARGET_OPTION_1: "media_player.example"
  BUTTON_DOUBLE_CLICK_TARGET_OPTION_2: "script.example"
  BUTTON_DOUBLE_CLICK_TARGET_OPTION_3: "scene.example"
  BUTTON_DOUBLE_CLICK_TARGET_OPTION_4: "light.example"
  BUTTON_DOUBLE_CLICK_TARGET_OPTION_5: "switch.example"
  BUTTON_DOUBLE_CLICK_TARGET_OPTION_6: "automation.example"
  BUTTON_DOUBLE_CLICK_TARGET_OPTION_7: "button.example"
  BUTTON_DOUBLE_CLICK_TARGET_OPTION_8: "input_boolean.example"

  BUTTON_MULTI_CLICK_DELAY: "250"  # The time to wait for another click, in msec
  BUTTON_PRESS_TIMEOUT: "10000"  # Ignore if button is pressed for longer than this time, in msec
  BUTTON_LONG_PRESS_DELAY: "500"  # The time to wait to consider a long press, in msec

  # Button numbers constants
  BUTTON_1_ID: '1'
  BUTTON_2_ID: '2'
  BUTTON_3_ID: '3'
  BUTTON_4_ID: '4'

  TAG_HW_BUTTONS: tx_ultimate_easy.hw.buttons

binary_sensor:
  - id: bs_button_1
    name: Button 1
    icon: mdi:gesture-tap-box
    platform: template
    internal: ${gang_count < 1}

  - id: bs_button_2
    name: Button 2
    icon: mdi:gesture-tap-box
    platform: template
    internal: ${gang_count < 2}

  - id: bs_button_3
    name: Button 3
    icon: mdi:gesture-tap-box
    platform: template
    internal: ${gang_count < 3}

  - id: bs_button_4
    name: Button 4
    icon: mdi:gesture-tap-box
    platform: template
    internal: ${gang_count < 4}

esphome:
  platformio_options:
    build_flags:
      - -D TX_ULTIMATE_EASY_HW_BUTTONS

globals:
  # Packed button actions - replaces 4 separate selects
  - id: button_actions_packed
    type: uint16_t
    restore_value: true
    initial_value: '4369'  # Binary: 0001000100010001 = all buttons set to option 1 (default action)
    # Bit layout: [button4(4)][button3(4)][button2(4)][button1(4)]
    # Each button uses 4 bits: 0=None, 1=Toggle, 2=Failsafe, 3-15=Reserved for future options

  - id: button_press_button
    type: uint8_t
    restore_value: false
    initial_value: '0'

  - id: button_press_position
    type: uint8_t
    restore_value: false
    initial_value: '0'

  - id: button_press_start_time  # Used for: current press duration (press → release)
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: last_release_time  # Used for: inter-click gap timing (time since last release)
    type: uint32_t
    restore_value: false
    initial_value: '0'

  - id: click_counter
    type: uint8_t
    restore_value: false
    initial_value: '0'

script:
  - id: !extend boot_initialize
    then:
      - script.execute: boot_initialize_buttons

  - id: boot_initialize_buttons
    mode: restart
    then:

  - id: button_action
    mode: parallel
    parameters:
      button: uint8_t
      action: string
      count: uint8_t
    then:
      - lambda: |-
          // Send event to Home Assistant
          esphome::tx_ultimate_easy::fire_ha_event("touch", "button", {
            {"action", action.c_str()},
            {"button_id", std::to_string(button)},
            {"count", std::to_string(count)},
            {"position", std::to_string(id(button_press_position))}
          });
          ESP_LOGI("${TAG_HW_BUTTONS}", "Button %" PRIu8 " action: '%s'", button, action.c_str());
          if (action == "click") {
            switch (button) {
              case ${BUTTON_1_ID}:
                bs_button_1_click_event->publish_state(true);
                break;
              case ${BUTTON_2_ID}:
                bs_button_2_click_event->publish_state(true);
                break;
              case ${BUTTON_3_ID}:
                bs_button_3_click_event->publish_state(true);
                break;
              case ${BUTTON_4_ID}:
                bs_button_4_click_event->publish_state(true);
                break;
            }
          } else if (action == "double_click") {
            switch (button) {
              case ${BUTTON_1_ID}:
                bs_button_1_double_click_event->publish_state(true);
                break;
              case ${BUTTON_2_ID}:
                bs_button_2_double_click_event->publish_state(true);
                break;
              case ${BUTTON_3_ID}:
                bs_button_3_double_click_event->publish_state(true);
                break;
              case ${BUTTON_4_ID}:
                bs_button_4_double_click_event->publish_state(true);
                break;
            }
          } else if (action == "long_press") {
            switch (button) {
              case ${BUTTON_1_ID}:
                bs_button_1_long_press_event->publish_state(true);
                break;
              case ${BUTTON_2_ID}:
                bs_button_2_long_press_event->publish_state(true);
                break;
              case ${BUTTON_3_ID}:
                bs_button_3_long_press_event->publish_state(true);
                break;
              case ${BUTTON_4_ID}:
                bs_button_4_long_press_event->publish_state(true);
                break;
            }
          }
          id(button_press_button) = 0;
          id(button_press_position) = 0;
          id(button_press_start_time) = 0;
          id(last_release_time) = 0;
          id(click_counter) = 0;
          buttons_release->execute();

  - id: button_click_event
    mode: restart
    parameters:
      button: uint8_t
      click_count: uint8_t
    then:
      - delay: !lambda return nr_button_multi_click_delay->state;
      - lambda: |-
          std::string event_name;
          if (click_count == 1) event_name = "click";
          else if (click_count == 2) event_name = "double_click";
          else event_name = "multiple_click";
          button_action->execute(button, event_name.c_str(), click_count);
      - if:
          condition:
            lambda: return click_count == 2;
          then:
            - script.execute:
                id: button_double_click_handle
                button: !lambda return button;

  - id: button_double_click_handle
    mode: parallel
    parameters:
      button: uint8_t
    then:
      - lambda: |-
          std::string configured_action = "${BUTTON_DOUBLE_CLICK_ACTION_NONE_TEXT}";
          std::string target_entity_id;

          switch (button) {
            case ${BUTTON_1_ID}:
              configured_action = sl_button_1_double_click_action->current_option();
              target_entity_id = sl_button_1_double_click_target->current_option();
              break;
            case ${BUTTON_2_ID}:
              configured_action = sl_button_2_double_click_action->current_option();
              target_entity_id = sl_button_2_double_click_target->current_option();
              break;
            case ${BUTTON_3_ID}:
              configured_action = sl_button_3_double_click_action->current_option();
              target_entity_id = sl_button_3_double_click_target->current_option();
              break;
            case ${BUTTON_4_ID}:
              configured_action = sl_button_4_double_click_action->current_option();
              target_entity_id = sl_button_4_double_click_target->current_option();
              break;
            default:
              ESP_LOGW("${TAG_HW_BUTTONS}", "Unsupported button %" PRIu8 " for double-click dispatch", button);
              return;
          }

          ESP_LOGI("${TAG_HW_BUTTONS}",
                   "Button %" PRIu8 " double-click action selected: '%s' target='%s'",
                   button, configured_action.c_str(), target_entity_id.c_str());

          if (configured_action == "${BUTTON_DOUBLE_CLICK_ACTION_NONE_TEXT}") {
            return;
          }

          if ((target_entity_id.empty() || target_entity_id == "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}") &&
              configured_action != "${BUTTON_DOUBLE_CLICK_ACTION_RELAY_1_TOGGLE_TEXT}" &&
              configured_action != "${BUTTON_DOUBLE_CLICK_ACTION_RELAY_2_TOGGLE_TEXT}" &&
              configured_action != "${BUTTON_DOUBLE_CLICK_ACTION_RELAY_3_TOGGLE_TEXT}" &&
              configured_action != "${BUTTON_DOUBLE_CLICK_ACTION_RELAY_4_TOGGLE_TEXT}") {
            ESP_LOGW("${TAG_HW_BUTTONS}",
                     "Button %" PRIu8 " double-click action '%s' requires a target entity_id",
                     button, configured_action.c_str());
          }
      - if:
          condition:
            lambda: |-
              if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_HA_TOGGLE_TEXT}" && id(sl_button_1_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_HA_TOGGLE_TEXT}" && id(sl_button_2_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_HA_TOGGLE_TEXT}" && id(sl_button_3_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_4_ID}) return id(sl_button_4_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_HA_TOGGLE_TEXT}" && id(sl_button_4_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              return false;
          then:
            - homeassistant.action:
                action: homeassistant.toggle
                data:
                  entity_id: !lambda |-
                    if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_target).current_option().c_str();
                    return id(sl_button_4_double_click_target).current_option().c_str();
      - if:
          condition:
            lambda: |-
              if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_HA_TURN_ON_TEXT}" && id(sl_button_1_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_HA_TURN_ON_TEXT}" && id(sl_button_2_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_HA_TURN_ON_TEXT}" && id(sl_button_3_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_4_ID}) return id(sl_button_4_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_HA_TURN_ON_TEXT}" && id(sl_button_4_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              return false;
          then:
            - homeassistant.action:
                action: homeassistant.turn_on
                data:
                  entity_id: !lambda |-
                    if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_target).current_option().c_str();
                    return id(sl_button_4_double_click_target).current_option().c_str();
      - if:
          condition:
            lambda: |-
              if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_HA_TURN_OFF_TEXT}" && id(sl_button_1_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_HA_TURN_OFF_TEXT}" && id(sl_button_2_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_HA_TURN_OFF_TEXT}" && id(sl_button_3_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_4_ID}) return id(sl_button_4_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_HA_TURN_OFF_TEXT}" && id(sl_button_4_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              return false;
          then:
            - homeassistant.action:
                action: homeassistant.turn_off
                data:
                  entity_id: !lambda |-
                    if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_target).current_option().c_str();
                    return id(sl_button_4_double_click_target).current_option().c_str();
      - if:
          condition:
            lambda: |-
              if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_PLAY_PAUSE_TEXT}" && id(sl_button_1_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_PLAY_PAUSE_TEXT}" && id(sl_button_2_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_PLAY_PAUSE_TEXT}" && id(sl_button_3_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_4_ID}) return id(sl_button_4_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_PLAY_PAUSE_TEXT}" && id(sl_button_4_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              return false;
          then:
            - homeassistant.action:
                action: media_player.media_play_pause
                data:
                  entity_id: !lambda |-
                    if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_target).current_option().c_str();
                    return id(sl_button_4_double_click_target).current_option().c_str();
      - if:
          condition:
            lambda: |-
              if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_NEXT_TEXT}" && id(sl_button_1_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_NEXT_TEXT}" && id(sl_button_2_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_NEXT_TEXT}" && id(sl_button_3_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_4_ID}) return id(sl_button_4_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_NEXT_TEXT}" && id(sl_button_4_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              return false;
          then:
            - homeassistant.action:
                action: media_player.media_next_track
                data:
                  entity_id: !lambda |-
                    if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_target).current_option().c_str();
                    return id(sl_button_4_double_click_target).current_option().c_str();
      - if:
          condition:
            lambda: |-
              if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_PREVIOUS_TEXT}" && id(sl_button_1_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_PREVIOUS_TEXT}" && id(sl_button_2_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_PREVIOUS_TEXT}" && id(sl_button_3_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_4_ID}) return id(sl_button_4_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_PREVIOUS_TEXT}" && id(sl_button_4_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              return false;
          then:
            - homeassistant.action:
                action: media_player.media_previous_track
                data:
                  entity_id: !lambda |-
                    if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_target).current_option().c_str();
                    return id(sl_button_4_double_click_target).current_option().c_str();
      - if:
          condition:
            lambda: |-
              if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_STOP_TEXT}" && id(sl_button_1_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_STOP_TEXT}" && id(sl_button_2_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_STOP_TEXT}" && id(sl_button_3_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_4_ID}) return id(sl_button_4_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_MEDIA_STOP_TEXT}" && id(sl_button_4_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              return false;
          then:
            - homeassistant.action:
                action: media_player.media_stop
                data:
                  entity_id: !lambda |-
                    if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_target).current_option().c_str();
                    if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_target).current_option().c_str();
                    return id(sl_button_4_double_click_target).current_option().c_str();
      - if:
          condition:
            lambda: |-
              if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_SCRIPT_TEXT}" && id(sl_button_1_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_2_ID}) return id(sl_button_2_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_SCRIPT_TEXT}" && id(sl_button_2_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_3_ID}) return id(sl_button_3_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_SCRIPT_TEXT}" && id(sl_button_3_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              if (button == ${BUTTON_4_ID}) return id(sl_button_4_double_click_action).current_option() == "${BUTTON_DOUBLE_CLICK_ACTION_SCRIPT_TEXT}" && id(sl_button_4_double_click_target).current_option() != "${BUTTON_DOUBLE_CLICK_TARGET_NONE_TEXT}";
              return false;
          then:
            - homeassistant.action:
                action: script.turn_on
                data:
                  entity_id: !lambda |-
                    if (button == ${BUTTON_1_ID}) return id(sl_button_1_double_click_target).current_option().c_str();
